name: Product Service CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
permissions:
  contents: write

jobs:
  # ── A. PR ONLY: SonarQube + Snyk validation ───────────────────────────────
  validate:
    name: Validate (Sonar + Snyk)
    if: github.event_name == 'pull_request'
    uses: shopnovaorg/shopnovaorg-shared/.github/workflows/sonar-and-snyk.yaml@main
    with:
      service-name: product-service
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ── B. Build image ─────────────────────────────────────────────────────────
  # On PR  : runs AFTER validate passes (gate enforced)
  # On push: validate is skipped → always() lets build proceed regardless
  build:
    name: Build Image
    needs: [validate]
    if: |
      always() &&
      (github.event_name == 'push' || needs.validate.result == 'success')
    uses: shopnovaorg/shopnovaorg-shared/.github/workflows/generate-tag-and-build-image-trivy.yaml@main
    with:
      image-name: abhinavbabu33/shopnova-product-service
      service-name: product-service
      run-trivy: ${{ github.event_name == 'pull_request' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ── C. PUSH ONLY: Push to DockerHub ──────────────────────────────────────
  push-image:
    name: Push to DockerHub
    needs: [build]
    if: |
       always() &&
       github.event_name == 'push' &&
       needs.build.result == 'success'
    uses: shopnovaorg/shopnovaorg-shared/.github/workflows/push.yaml@main
    with:
      image-name: abhinavbabu33/shopnova-product-service
      image-tag: ${{ needs.build.outputs.image-tag }}
      service-name: product-service
      is-main: ${{ github.ref_name == 'main' }}
      tag-exists: ${{ needs.build.outputs.tag-exists }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ── D. DEV PUSH ONLY: Update Helm values (dev branch) ────────────────────
  update-helm-dev:
    name: Update Helm Values (dev)
    needs: [build, push-image]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref_name == 'dev' &&
      needs.push-image.result == 'success'
    uses: shopnovaorg/shopnovaorg-shared/.github/workflows/helm-updater.yaml@main
    with:
      service-name: product-service
      image-tag: ${{ needs.build.outputs.image-tag }}
      helm-values-path: shopnova-micro-apps/product-service/values.dev.yaml
      target-branch: dev
    secrets:
      HELM_CHARTS_TOKEN: ${{ secrets.HELM_CHARTS_TOKEN }}

  # ── E. MAIN PUSH ONLY: Manual prod approval gate ──────────────────────────
  prod-approval-gate:
    name: Prod Approval Gate
    needs: [build, push-image]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref_name == 'main' &&
      needs.push-image.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approved — proceeding to Helm prod update
        run: echo "✅ Approved for tag ${{ needs.build.outputs.image-tag }}"

  # ── F. MAIN PUSH ONLY: Update Helm values (prod, main branch) ────────────
  update-helm-prod:
    name: Update Helm Values (prod)
    needs: [build, prod-approval-gate]
    if: |
      always() &&
      needs.prod-approval-gate.result == 'success'
    uses: shopnovaorg/shopnovaorg-shared/.github/workflows/helm-updater.yaml@main
    with:
      service-name: product-service
      image-tag: ${{ needs.build.outputs.image-tag }}
      helm-values-path: shopnova-micro-apps/product-service/values.yaml
      target-branch: main
    secrets:
      HELM_CHARTS_TOKEN: ${{ secrets.HELM_CHARTS_TOKEN }}

  # ── G. ALWAYS: Notify on any failure ─────────────────────────────────────
  notify:
    name: Notify on Failure
    needs: [validate, build, push-image, update-helm-dev, prod-approval-gate, update-helm-prod]
    if: always()
    uses: shopnovaorg/shopnovaorg-shared/.github/workflows/notify.yaml@main
    with:
      service-name: product-service
      branch: ${{ github.ref_name }}
      run-id: ${{ github.run_id }}
      repository: ${{ github.repository }}
      git-tag: ${{ needs.build.outputs.image-tag }}
      sonarqube-result: ${{ needs.validate.result }}
      build-result: ${{ needs.build.result }}
      push-result: ${{ needs.push-image.result }}
    secrets:
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
      NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
